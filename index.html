<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎵 PLAYSTAR</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <!-- TOPO -->
    <header class="topbar">
        <h1>🎵 PLAYSTAR</h1>

        <div id="userArea">
            <span id="usuario">Não ligado</span>
            <button onclick="sair()">Sair</button>
        </div>
    </header>

    <!-- LOGIN -->
    <div id="loginArea" class="card">

        <h2>Entrar</h2>

        <input id="email" type="email" placeholder="Gmail">

        <input id="senha" type="password" placeholder="Senha">

        <button onclick="entrar()">
            Entrar
        </button>

        <button onclick="criarConta()">
            Criar Conta
        </button>

        <button class="google-btn" onclick="googleLogin()">
            Continuar com Google
        </button>

    </div>

    <!-- PESQUISA -->
    <div class="search-box">

        <input
            id="url"
            placeholder="Pesquisar música ou colar link">

        <button onclick="pesquisar()">
            🔍 Pesquisar
        </button>

    </div>

    <!-- RESULTADOS -->
    <div id="resultado">

        <div class="card">

            🎵 Pesquise uma música

        </div>

    </div>

    <!-- PLAYER -->
    <div id="player">

        <div class="player-info">

            <h3 id="nomeMusica">
                Nenhuma música
            </h3>

            <p id="nomeArtista">
                ---
            </p>

        </div>

        <div class="player-buttons">

            <button onclick="anterior()">
                ⏮️
            </button>

            <button onclick="baixarAudio()">
                ▶️
            </button>

            <button onclick="proximo()">
                ⏭️
            </button>

            <button>
                ❤️
            </button>

        </div>

    </div>

    <!-- HISTORICO -->
    <div class="card">

        <h2>📚 Histórico</h2>

        <div id="historico">
            Nenhuma música
        </div>

    </div>

    <!-- FAVORITOS -->
    <div class="card">

        <h2>❤️ Favoritos</h2>

        <div id="favoritos">
            Nenhum favorito
        </div>

    </div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
