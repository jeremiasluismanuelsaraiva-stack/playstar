<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎵 PLAYSTAR</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1>🎵 PLAYSTAR</h1>



<div id="loginArea">


<input
id="email"
type="email"
placeholder="Email">


<input
id="senha"
type="password"
placeholder="Senha">


<button onclick="login()">
🔐 Entrar
</button>


<button onclick="googleLogin()">
🌐 Continuar com Google
</button>


</div>





<div id="userArea" style="display:none">


<p id="usuario">
👤 Usuário
</p>


</div>






<div class="search">


<input

id="searchInput"

placeholder="🔍 Pesquisar música...">


<button onclick="pesquisar()">

Pesquisar

</button>


</div>







<div id="resultado">


<div class="card">

🎵 Pesquise uma música

</div>


</div>







<div class="card">


<img

id="cover"

src="assets/default-cover.jpg"

width="200">



<h2 id="nomeMusica">

Nenhuma música

</h2>



<p id="nomeArtista">

🎤 Nenhum artista

</p>





<audio

id="audioPlayer"

controls>

</audio>





<br>


<button onclick="anterior()">

⏮️

</button>



<button onclick="tocarAtual()">

▶️

</button>



<button onclick="proximo()">

⏭️

</button>



<button onclick="favoritar()">

❤️

</button>


</div>







<div id="historico">

<h2>
🎧 Histórico
</h2>


</div>







<div id="favoritos">

<h2>
❤️ Favoritos
</h2>


<div class="card">

Nenhum favorito

</div>


</div>




</div>






<script type="module" src="script.js"></script>


</body>


</html>
